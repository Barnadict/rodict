# Quoted because an unquoted `#` starts a YAML comment — without quotes this
# name silently truncates to "Collect (Task", which breaks the workflow_run
# trigger in analytics.yml that matches on it by name.
name: "Collect (Task #32)"

# Runs the data collector against the hosted DB on a schedule, so game/genre
# snapshot history keeps accumulating even when nobody is running `npm run
# collect` locally. Local scheduling (node-cron) was intentionally skipped as
# Task #12 in favor of this.

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch:
    inputs:
      knownOnly:
        description: "Skip keyword discovery, only re-collect known games"
        type: boolean
        default: false

jobs:
  collect:
    runs-on: ubuntu-latest
    # Headroom for a multi-thousand-game corpus: discovery walks the omni-search
    # tail + the explore-api charts, and the collector fetches/persists them all.
    # The bulk write path (persistCollectedGames) keeps the DB phase to seconds;
    # the API fetch is the long pole. 30 min is generous vs. the 3h cron gap.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Run collector
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
        run: |
          if [ "${{ inputs.knownOnly }}" = "true" ]; then
            npm run collect -- --known-only
          else
            npm run collect
          fi

  # Alert on failed runs (Task #34) — these run unattended on a cron, so a red
  # tab nobody checks isn't a signal.
  alert:
    needs: collect
    if: failure()
    uses: ./.github/workflows/alert-on-failure.yml
    with:
      pipeline: collect
      run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    permissions:
      issues: write
